<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Test 1 — Gradient Orb</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FFFFFF; color: #000000; font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; }

.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Orb layer */
.orb-container {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.6;
  animation: drift 8s ease-in-out infinite;
}
.orb-1 { width: 500px; height: 500px; background: #FFF133; top: -100px; left: -150px; animation-delay: 0s; }
.orb-2 { width: 400px; height: 400px; background: #FF3131; bottom: -80px; right: -100px; animation-delay: -3s; }
.orb-3 { width: 350px; height: 350px; background: #2E5BFF; top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: 0.3; animation-delay: -5s; }

@keyframes drift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33%       { transform: translate(30px, -20px) scale(1.05); }
  66%       { transform: translate(-20px, 30px) scale(0.95); }
}
.orb-3 { animation-name: drift3; }
@keyframes drift3 {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50%       { transform: translate(-50%, -50%) scale(1.1); }
}

/* Grid overlay */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 1;
}

/* Border frame */
.border-frame {
  position: absolute;
  inset: 24px;
  border: 2px solid #000000;
  z-index: 2;
  pointer-events: none;
}
.corner { position: absolute; width: 12px; height: 12px; background: #000000; }
.corner-tl { top: -2px; left: -2px; }
.corner-tr { top: -2px; right: -2px; }
.corner-bl { bottom: -2px; left: -2px; }
.corner-br { bottom: -2px; right: -2px; }

/* Content */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  max-width: 900px;
  padding: 48px;
}

.badge {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: #000000;
  color: #FFF133;
  padding: 4px 16px;
  margin-bottom: 40px;
}

h1 {
  font-size: clamp(4rem, 10vw, 9rem);
  font-weight: 900;
  line-height: 0.88;
  letter-spacing: -0.05em;
  text-transform: uppercase;
  color: #000000;
  mix-blend-mode: multiply;
}

h1 .outline {
  color: transparent;
  -webkit-text-stroke: 3px #000000;
}

h1 .highlight {
  background: #FF3131;
  color: #FFFFFF;
  padding: 0 8px;
  -webkit-text-stroke: 0;
}

.sub {
  margin-top: 40px;
  font-size: 1.25rem;
  font-weight: 300;
  line-height: 1.6;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  color: #000000;
}

.sub strong { font-weight: 700; }

.cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 48px;
  background: #000000;
  color: #FFFFFF;
  font-family: 'Space Mono', monospace;
  font-size: 0.875rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 14px 28px;
  border: 2px solid #000000;
  text-decoration: none;
  box-shadow: 6px 6px 0px #FF3131;
  transition: all 0.1s ease;
  cursor: pointer;
}
.cta:hover {
  box-shadow: 0px 0px 0px #FF3131;
  transform: translate(3px, 3px);
  background: #FF3131;
}

.label {
  position: absolute;
  bottom: 40px;
  right: 40px;
  font-family: 'Space Mono', monospace;
  font-size: 0.625rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #000000;
  opacity: 0.4;
  z-index: 10;
}
</style>
</head>
<body>
<section class="hero">
  <div class="orb-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="grid-overlay"></div>
  <div class="border-frame">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
  </div>

  <div class="content">
    <div class="badge">[ Portfolio — Nobu ]</div>
    <h1>
      Plant<span class="outline">ing</span><br>
      <span class="highlight">Seeds</span> for<br>
      Local Futures
    </h1>
    <p class="sub">
      Collaborating with regional cities to design sustainable communities,<br>
      focused on <strong>education</strong> and <strong>youth empowerment</strong>.
    </p>
    <a class="cta" href="#">Say Hello →</a>
  </div>

  <div class="label">Pattern 01 — Gradient Orb</div>
</section>
</body>
</html>
