<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Test 4 — Abstract Lines</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FFFFFF; color: #000000; font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; }

.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  padding: 80px;
  overflow: hidden;
}

canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}

/* Horizontal rule accent */
.top-rule {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, #FF3131 0%, #2E5BFF 50%, #FFF133 100%);
  z-index: 10;
}

.content {
  position: relative;
  z-index: 10;
  max-width: 900px;
}

.row-top {
  display: flex;
  align-items: flex-start;
  gap: 60px;
  margin-bottom: 0;
}

.headline-block { flex: 1; }

.side-info {
  padding-top: 16px;
  width: 200px;
  flex-shrink: 0;
}

.badge {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #000000;
  background: #FFF133;
  border: 1px solid #000000;
  padding: 3px 10px;
  display: inline-block;
  margin-bottom: 28px;
}

h1 {
  font-size: clamp(3.5rem, 8vw, 8rem);
  font-weight: 900;
  line-height: 0.87;
  letter-spacing: -0.05em;
  text-transform: uppercase;
  color: #000000;
  position: relative;
}

.outline {
  color: transparent;
  -webkit-text-stroke: 2.5px #000000;
}

.strike-through {
  position: relative;
  display: inline-block;
}
.strike-through::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 4px;
  background: #FF3131;
  transform: translateY(-50%);
}

.side-info .mono {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(0,0,0,0.5);
  margin-bottom: 8px;
}
.side-info .value {
  font-size: 1rem;
  font-weight: 700;
  color: #000000;
  margin-bottom: 24px;
}

.divider {
  width: 100%;
  height: 2px;
  background: #000000;
  margin: 36px 0;
  position: relative;
}
.divider::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 80px;
  height: 100%;
  background: #FF3131;
}

.bottom-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 48px;
}

.sub {
  font-size: 1.1rem;
  font-weight: 400;
  line-height: 1.65;
  max-width: 420px;
  color: #000000;
}
.sub em { font-style: normal; font-weight: 700; color: #2E5BFF; }

.cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #FF3131;
  color: #FFFFFF;
  font-family: 'Space Mono', monospace;
  font-size: 0.875rem;
  font-weight: 700;
  text-transform: uppercase;
  padding: 14px 28px;
  border: 2px solid #000000;
  text-decoration: none;
  box-shadow: 5px 5px 0px #000000;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.1s;
  cursor: pointer;
}
.cta:hover {
  box-shadow: 0 0 0 #000000;
  transform: translate(3px, 3px);
}

.label {
  position: absolute;
  bottom: 20px;
  right: 24px;
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: rgba(0,0,0,0.25);
  z-index: 10;
}
</style>
</head>
<body>
<section class="hero">
  <div class="top-rule"></div>
  <canvas id="c"></canvas>

  <div class="content">
    <div class="row-top">
      <div class="headline-block">
        <div class="badge">[ 01 — Mission ]</div>
        <h1>
          Plant<span class="outline">ing</span><br>
          Seeds <span class="strike-through">for</span><br>
          Local<br>
          Futures.
        </h1>
      </div>
      <div class="side-info">
        <div class="mono">Current Base</div>
        <div class="value">Nagano<br>Prefecture</div>
        <div class="mono">Coordinates</div>
        <div class="value" style="font-size:0.8rem">36.6485° N<br>138.1948° E</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="bottom-row">
      <p class="sub">
        Collaborating with regional cities to design sustainable communities — focused on <em>education</em> and youth empowerment.
      </p>
      <a class="cta" href="#">Say Hello →</a>
    </div>
  </div>

  <div class="label">Pattern 04 — Abstract Lines</div>
</section>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PALETTE = ['#FF3131', '#2E5BFF', '#FFF133', '#000000'];

const lines = Array.from({ length: 18 }, (_, i) => ({
  x1: Math.random() * 1.5 * (i % 2 === 0 ? 1 : -1),
  y1: Math.random(),
  x2: Math.random() * 1.5,
  y2: Math.random(),
  color: PALETTE[Math.floor(Math.random() * PALETTE.length)],
  alpha: Math.random() * 0.12 + 0.04,
  width: Math.random() * 2 + 0.5,
  phase: Math.random() * Math.PI * 2,
  speed: (Math.random() * 0.002 + 0.001) * (Math.random() > 0.5 ? 1 : -1),
}));

let t = 0;
function draw() {
  ctx.clearRect(0, 0, W, H);
  t += 0.008;

  lines.forEach(l => {
    const wave = Math.sin(t * l.speed * 400 + l.phase) * 0.05;
    const x1 = (l.x1 + wave) * W;
    const y1 = l.y1 * H;
    const x2 = l.x2 * W;
    const y2 = (l.y2 + wave * 0.5) * H;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = l.color;
    ctx.globalAlpha = l.alpha;
    ctx.lineWidth = l.width;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
